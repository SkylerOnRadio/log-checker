name: Test Installers
on:
  push:
    branches: [improved-install, improve-installers]
  pull_request:
    branches: [master, main]

jobs:
  test-unix:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # Keep running Ubuntu even if macOS fails
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pipx
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt update && sudo apt install -y pipx
          else
            brew install pipx
          fi
          # This tells GitHub to permanently add the pipx bin to the PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run installer
        run: bash install.sh

      - name: Verify command
        run: check-log --version

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pipx
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          # Windows uses a different path for pipx binaries
          echo "$env:USERPROFILE\.local\bin" >> $env:GITHUB_PATH
        shell: pwsh

      - name: Run PowerShell installer
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          .\install.ps1
        shell: pwsh

      - name: Verify command
        run: check-log --version
        shell: pwsh
