name: Test Installers
on:
  push:
    branches: [improved-install, improve-installers]
  pull_request:
    branches: [master, main]

jobs:
  test-unix:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install pipx
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt update && sudo apt install -y pipx
          else
            brew install pipx
          fi
          pipx ensurepath

      - name: Run installer
        run: bash install.sh

      - name: Verify command
        run: |
          # Manually add the pipx bin path for the rest of this job
          export PATH="$PATH:$HOME/.local/bin"
          check-log --version

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install pipx
        run: python -m pip install --user pipx

      - name: Run PowerShell installer
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          .\install.ps1
        shell: powershell

      - name: Verify command
        run: |
          $env:PATH += ";$env:USERPROFILE\.local\bin"
          check-log --version
        shell: powershell
